services:
  airdeal-vn-bot:
    build: .
    container_name: airdeal-vn-bot
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
